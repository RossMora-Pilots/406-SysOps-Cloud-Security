name: Rust CI

on:
  push:
    paths:
      - "CC/**/scripts/ping_sweep/**"
  pull_request:
    paths:
      - "CC/**/scripts/ping_sweep/**"

permissions:
  contents: read

jobs:
  check:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CC/Winter 2025/SysOps and Cloud Security - Aditya Palshikar - CSC-7308/scripts/ping_sweep

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            CC/Winter 2025/SysOps and Cloud Security - Aditya Palshikar - CSC-7308/scripts/ping_sweep/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --verbose
